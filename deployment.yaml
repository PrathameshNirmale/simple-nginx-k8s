apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release. Name }}-deployment
spec:
  replicas: {{ .Values.replicaCount }} 
  selector:
    matchLabels:
      app: {{.Chart.Name}}
  template:
    metadata:
      labels:
        app: {{.Chart.Name}}
    spec:
      imagePullSecrets:
      - name: nexus-secret
      containers:
      - name: nginx
        image:  "{{ .Values.image.repository }}:{ { .Values.image.tag }}" 
        imagePullPolicy: Always
        ports:
        - containerPort: 80