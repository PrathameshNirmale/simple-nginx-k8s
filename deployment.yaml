apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx-demo

  template:
    metadata:
      labels:
        app: nginx-demo

    spec:
      containers:
        - name: nginx-demo
          image: 192.168.150.24:8082/nginx-demo:latest
          imagePullPolicy: Always

        ports:
        - containerPort: 80
